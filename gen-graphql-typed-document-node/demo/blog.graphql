# Demo SDL for gen-graphql-typed-document-node.
# Mix of queries with refs, scalars, and lists.

scalar DateTime

type User {
  id: ID!
  name: String!
  posts: [Post!]!
}

type Post {
  id: ID!
  title: String!
  body: String
  publishedAt: DateTime
}

input CreatePostInput {
  title: String!
  body: String
}

type Query {
  user(id: ID!): User
  postCount: Int!
  posts(limit: Int = 10): [Post!]!
}

type Mutation {
  createPost(input: CreatePostInput!): Post!
}
